<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Expand Your Mind</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .hero {
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 1.5rem 0;
            line-height: 1.1;
            font-weight: 800;
        }

        p {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        /* Small visual flair */
        .circle {
            position: absolute;
            z-index: -1;
            background: rgba(79, 70, 229, 0.05);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px;"></div>

    <div class="hero">
        <div class="logo">LearningSpot</div>
        <h1>Master any skill, anywhere.</h1>
        <p>Access world-class resources and structured paths designed to help you grow faster.</p>
        
        <a href="https://EducationMenu.vercel.app" class="btn">Start Learning</a>
    </div>
</body>
</html>
