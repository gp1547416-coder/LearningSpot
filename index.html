<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningSpot | Home</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .hero { max-width: 500px; padding: 2rem; }
        h1 { font-size: 3rem; color: #1e293b; margin-bottom: 1rem; }
        p { color: #64748b; margin-bottom: 2rem; }
        
        .btn {
            background: #4f46e5;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn:hover { background: #4338ca; transform: translateY(-2px); }

        /* Secret Math Quiz Overlay */
        #math-platform {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>LearningSpot</h1>
        <p>The ultimate destination for academic excellence.</p>
        <button onclick="checkCode()" class="btn">Get Started</button>
    </div>

    <div id="math-platform">
        <h2>Daily Math Assessment</h2>
        <p>Complete all 60 questions to proceed.</p>
        <hr>
        <div id="quiz-container" style="text-align: left; max-width: 600px; margin: auto;"></div>
        <button onclick="location.reload()" class="btn" style="margin-top: 20px;">Submit Answers</button>
    </div>

    <script>
        function checkCode() {
            const code = prompt("Please enter your Class Code:");
            
            if (code === "lol") {
                // Redirect to your Education Menu
                window.location.href = "https://educationmenu.vercel.app";
            } else if (code !== null) {
                // Open the math platform
                startMathQuiz();
            }
        }

        function startMathQuiz() {
            const container = document.getElementById('quiz-container');
            document.getElementById('math-platform').style.display = 'block';
            
            let questionsHTML = "";
            for (let i = 1; i <= 60; i++) {
                // Generates random simple math
                const a = Math.floor(Math.random() * 50) + 1;
                const b = Math.floor(Math.random() * 50) + 1;
                questionsHTML += `
                    <div style="margin-bottom: 15px;">
                        <p><strong>Question ${i}:</strong> What is ${a} + ${b}?</p>
                        <input type="number" style="padding: 5px; width: 100px;">
                    </div>
                `;
            }
            container.innerHTML = questionsHTML;
        }
    </script>
</body>
</html>
