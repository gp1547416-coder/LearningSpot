<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vercel Project</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
        }
        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 3rem;
            border-radius: 12px;
            background: #111;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #888; font-size: 1.1rem; }
        .badge {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">LIVE ON VERCEL</div>
        <h1>Hello World.</h1>
        <p>My new project is officially under construction.</p>
    </div>
</body>
</html>
